<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موز علی کاسب</title>
<style>
body{
    font-family:tahoma;
    background:#111;
    color:white;
    text-align:center;
    margin:0;
}
header{
    background:#ffcc00;
    color:black;
    padding:20px;
    font-size:35px;
    font-weight:bold;
}
.box{
    background:#222;
    width:80%;
    max-width:700px;
    margin:30px auto;
    padding:20px;
    border-radius:15px;
}
button{
    background:#ffcc00;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}
footer{
    margin-top:30px;
    padding:15px;
    background:#000;
}
</style>
</head>
<body>

<header>موز علی کاسب</header>

<div class="box">
<h2>خرید و فروش اکانت بازی</h2>
<p>اکانت کالاف دیوتی</p>
<p>اکانت پابجی</p>
<p>اکانت پسرخوانده</p>

<h3>شماره تماس</h3>
<p>09123456789</p>

<button onclick="alert('برای خرید یا فروش تماس بگیرید')">
خرید یا فروش اکانت
</button>
</div>

<footer>
تیم ساخت سایت: موز علی استودیو
</footer>

</body>
</html>
